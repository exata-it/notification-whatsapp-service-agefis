version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-whatsapp-email-service-agefis
    restart: unless-stopped
    networks:
      - dokploy-network
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/docs" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dokploy-network:
    external: true
    name: dokploy-network